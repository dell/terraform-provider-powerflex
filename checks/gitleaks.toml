[[rules]]
description = "Hardcoded credentials in Go files"
regex = '''(?i)(?:secret|key|signature|password|pwd|pass|token)(?:\w|\s*?)(?:=|:=)(?:\s*?)[\"'`](.{4,120}?)[\"'`]'''
tags = ["credentials", "hardcoded", "go"]
[[rules.entropies]]
min = 3
max = 7
group = 1

[[rules]]
description = "IP address containing 10.247."
regex = '''\b10\.247\.\d{1,3}\.\d{1,3}\b'''
tags = ["ip", "address", "network"]


# Allowlist to ignore specific patterns
[allowlist]
description = "Whitelist specific patterns"
regexes = ["(?i)password\\s*=\\s*\"DummyPassword\"","(?i)password\\s*=\\s*\"password\""]